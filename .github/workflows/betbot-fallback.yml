name: Betbot – Fallback (~30 Min vor Anstoß)

# Gleiche Heartbeat-Architektur wie betbot-auto, aber nur für die Gruppen, in
# denen Jannik selbst tippt. Der Bot springt nur ein, wenn ~30 Min vor Anstoß
# noch kein Tipp gesetzt ist (kein --override). Claude läuft nur bei Bedarf.
on:
  schedule:
    # alle 15 Min (Offset). 40m-Fenster puffert Cron-Jitter, sodass zuverlässig
    # ~25–40 Min vor Anstoß getippt wird.
    - cron: "9,24,39,54 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write

# TZ=Europe/Berlin: kicktipp zeigt Zeiten in CEST; ohne TZ-Fix würde datetime.now()
# UTC zurückgeben → 2h Offset → Deadline-Fenster startet erst bei Anstoß statt davor.
env:
  FALLBACK_COMMUNITIES: "acmilfhunters172 svawm"
  TZ: "Europe/Berlin"

jobs:
  fallback-bet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1) GATE (reines Python): Hat eine der Fallback-Gruppen ein ungetipptes
      #    Spiel in den nächsten ~40 Min?
      - id: gate
        name: Gate – offene Spiele im 40m-Fenster finden
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
        run: |
          set -o pipefail
          OUT=$(python kicktippbb.py --dry-run --use-login-token "$KICKTIPP_TOKEN" \
                  --predictor FixedPredictor --deadline 40m $FALLBACK_COMMUNITIES) \
                  || { echo "$OUT"; exit 1; }
          echo "$OUT"
          COMMS=$(echo "$OUT" | awk '
            /^Community: /{c=$2; next}
            / - betting [0-9X]/{ if (!seen[c]++) print c }
          ' | tr "\n" " " | sed "s/ *$//")
          echo "communities=$COMMS" >> "$GITHUB_OUTPUT"
          if [ -n "$COMMS" ]; then
            echo "work=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Fallback fällig für: $COMMS"
          else
            echo "work=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Nichts zu tun – Claude wird nicht gestartet."
          fi

      # 2) RECHERCHE (Claude/Abo, nur wenn Arbeit): schreibt nur predictions.json.
      - if: steps.gate.outputs.work == 'true'
        name: Recherche – predictions.json schreiben
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Reiner Recherche-Auftrag. NICHT tippen, NICHTS auf GitHub posten, kein git.
            Betroffene Communities: ${{ steps.gate.outputs.communities }}

            1. Spiele/Teamnamen ansehen (Dry-Run):
               python kicktippbb.py --dry-run --use-login-token "$KICKTIPP_TOKEN" --predictor FixedPredictor --deadline 40m ${{ steps.gate.outputs.communities }}
               → Notiere alle Zeilen mit "- betting". Das ERSTE Team ist HEIMTEAM, das zweite AUSWÄRTSTEAM.

            2. Für jedes "betting"-Spiel: schnelle Web-Recherche
               (aktuelle Form, Aufstellung; WM 2026 beachten).

            3. Schreibe predictions.json – KRITISCH: Tore-Reihenfolge [heim_tore, gast_tore]:
               {
                 "Heimteam - Auswärtsteam": {"tip": [HEIM_TORE, GAST_TORE], "reason": "max. 1 Satz"}
               }
               ⚠️  [HEIM_TORE, GAST_TORE] = erst Heimtore, dann Gasttore.
               Beispiel: Deutschland (Heim) gewinnt 3:1 → "tip": [3, 1]  (NICHT [1, 3]!)
               Teamnamen EXAKT wie im Dry-Run-Output. Nur die "betting"-Spiele aufnehmen.
          claude_args: |
            --max-turns 20
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}

      # 3) TIPPEN (reines Python): platziert nur, wo noch kein Tipp existiert
      #    (KEIN --override – Janniks eigene Tipps bleiben unangetastet).
      - if: steps.gate.outputs.work == 'true'
        name: Tipps platzieren
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
        run: |
          python kicktippbb.py --use-login-token "$KICKTIPP_TOKEN" \
            --predictor FixedPredictor --deadline 40m ${{ steps.gate.outputs.communities }}

      # 4) REPORT (reines Bash/gh).
      - if: steps.gate.outputs.work == 'true'
        name: Report posten
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(python betbot_report.py "Fallback-Tipps")
          ISSUE=$(gh issue list --label betbot-report --state all --json number --jq '.[0].number // empty')
          if [ -z "$ISSUE" ]; then
            URL=$(gh issue create --title "🤖 Betbot Tagesberichte" --label betbot-report \
                    --body "Automatische Tipp-Berichte des Betbots.")
            ISSUE=$(basename "$URL")
          fi
          gh issue comment "$ISSUE" --body "$BODY"
