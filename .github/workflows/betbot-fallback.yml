name: Betbot – Stündlicher Fallback (acmilfhunters172 & svawm)

on:
  schedule:
    # Stündlich von 07:00 bis 22:00 CEST (05:00–20:00 UTC)
    # Deckt alle WM-Anstoßzeiten ab; --deadline 1h sorgt für gezieltes Einspringen
    - cron: "0 5-20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  fallback-bet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Führe die Fallback-Routine durch.
            Lies CLAUDE.md, Abschnitt "GitHub Actions: Stündlicher Fallback", und arbeite alle Schritte ab.
          claude_args: |
            --max-turns 30
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
