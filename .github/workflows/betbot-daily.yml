name: Betbot – Tägliche Auto-Tipps

on:
  schedule:
    # 08:00 CEST (UTC+2, Sommerzeit) = 06:00 UTC
    # Im Winter (CET, UTC+1) wäre 07:00 UTC nötig – bei Bedarf anpassen
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  daily-bet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Führe die tägliche Betbot-Routine durch.
            Lies CLAUDE.md, Abschnitt "GitHub Actions: Tägliche Auto-Tipps", und arbeite alle Schritte ab.
          claude_args: "--max-turns 40"
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
