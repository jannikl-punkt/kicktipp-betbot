name: Betbot – Interaktive Anpassungen (@claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  interactive:
    # Nur auf @claude-Erwähnungen von Menschen reagieren (nicht auf Bot-Kommentare)
    if: contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Explizites prompt => Agent-Modus statt Tag-Modus.
      # Der Tag-Modus von claude-code-action@v1 ignoriert --allowedTools
      # (Bash/WebSearch bleiben gesperrt) und crasht aktuell beim Start.
      # Der Kommentartext wird injection-sicher per Env-Variable übergeben.
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Ein Nutzer hat einen @claude-Kommentar in GitHub Issue #${{ github.event.issue.number }} geschrieben.
            Der Kommentartext steht in der Umgebungsvariable COMMENT_BODY (lesen per: echo "$COMMENT_BODY").
            Lies CLAUDE.md, Abschnitt "Interaktive Anpassungen (@claude Kommentare)", und führe die Anfrage aus.
            Poste deine Antwort am Ende als Issue-Kommentar:
            gh issue comment ${{ github.event.issue.number }} --body "<deine antwort>"
          claude_args: |
            --max-turns 30
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ github.token }}
