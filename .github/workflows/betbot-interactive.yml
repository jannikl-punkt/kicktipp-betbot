name: Betbot – Interaktive Anpassungen (@claude)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  interactive:
    # Nur auf @claude-Erwähnungen reagieren
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Kein prompt: claude-code-action liest den @claude-Kommentar automatisch.
          # Kontext aus CLAUDE.md (Abschnitt "Interaktive Anpassungen") wird genutzt.
          claude_args: "--max-turns 20"
        env:
          KICKTIPP_TOKEN: ${{ secrets.KICKTIPP_TOKEN }}
